<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Заряд</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f4; }
        header { background: #333; color: white; padding: 15px; text-align: center; font-size: 24px; position: sticky; top: 0; z-index: 100; }
        
        /* Стилі каталогу */
        .categories { display: flex; gap: 10px; overflow-x: auto; padding: 10px; background: white; white-space: nowrap; border-bottom: 1px solid #ddd; }
        .categories button { padding: 8px 15px; border-radius: 20px; border: 1px solid #333; background: white; cursor: pointer; font-size: 14px; }
        .categories button.active { background: #333; color: white; }

        .container { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .product-card { background: white; padding: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .product-card img { max-width: 100%; border-radius: 8px; height: 150px; object-fit: cover; }
        .product-card h3 { font-size: 16px; margin: 10px 0; }
        .product-card p { color: #e67e22; font-weight: bold; font-size: 18px; }

        #admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.3); z-index: 1000; width: 90%; max-width: 400px; }
        #admin-panel input, #admin-panel select { width: 100%; margin: 10px 0; padding: 10px; box-sizing: border-box; }
        .admin-btn { position: fixed; bottom: 10px; left: 10px; width: 40px; height: 40px; background: transparent; border: none; cursor: pointer; z-index: 1000; }
    </style>
</head>
<body>

<header>МАГАЗИН ЗАРЯД</header>

<div class="categories" id="category-bar">
    <button class="active" onclick="filterProducts('all')">Усі</button>
    <button onclick="filterProducts('навушники')">Навушники</button>
    <button onclick="filterProducts('годинники')">Годинники</button>
    <button onclick="filterProducts('павербанки')">Павербанки</button>
    <button onclick="filterProducts('чохли')">Чохли</button>
</div>

<div class="container" id="products-container">
    </div>

<button class="admin-btn" onclick="checkAdmin()"></button>

<div id="admin-panel">
    <h3>Додати товар</h3>
    <input type="text" id="prodName" placeholder="Назва товару">
    <input type="number" id="prodPrice" placeholder="Ціна (грн)">
    <input type="text" id="prodImg" placeholder="Посилання на фото (якщо є)">
    <select id="prodCategory">
        <option value="навушники">Навушники</option>
        <option value="годинники">Годинники</option>
        <option value="павербанки">Павербанки</option>
        <option value="чохли">Чохли</option>
    </select>
    <button onclick="saveProduct()" style="width: 100%; padding: 10px; background: green; color: white; border: none; border-radius: 5px;">Зберегти</button>
    <button onclick="closeAdmin()" style="width: 100%; margin-top: 5px; padding: 10px; background: red; color: white; border: none; border-radius: 5px;">Закрити</button>
</div>

<script>
    // ТВОЇ ДАНІ FIREBASE (вони залишаються без змін)
    const firebaseConfig = {
        databaseURL: "https://shop-zaryad-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allProducts = [];

    function checkAdmin() {
        const pass = prompt("Введіть пароль:");
        if (pass === "Sss0924") {
            document.getElementById('admin-panel').style.display = 'block';
        }
    }

    function closeAdmin() {
        document.getElementById('admin-panel').style.display = 'none';
    }

    function saveProduct() {
        const name = document.getElementById('prodName').value;
        const price = document.getElementById('prodPrice').value;
        const img = document.getElementById('prodImg').value || 'https://via.placeholder.com/150';
        const category = document.getElementById('prodCategory').value;

        if(name && price) {
            db.ref('products').push({
                name: name,
                price: price,
                img: img,
                category: category
            });
            alert("Товар додано!");
            closeAdmin();
        }
    }

    function displayProducts(products) {
        const container = document.getElementById('products-container');
        container.innerHTML = '';
        products.forEach(p => {
            container.innerHTML += `
                <div class="product-card">
                    <img src="${p.img}">
                    <h3>${p.name}</h3>
                    <p>${p.price} грн</p>
                </div>
            `;
        });
    }

    function filterProducts(category) {
        // Оновлюємо вигляд кнопок
        const buttons = document.querySelectorAll('.categories button');
        buttons.forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        if (category === 'all') {
            displayProducts(allProducts);
        } else {
            const filtered = allProducts.filter(p => p.category === category);
            displayProducts(filtered);
        }
    }

    // Завантаження товарів
    db.ref('products').on('value', (snapshot) => {
        allProducts = [];
        snapshot.forEach(child => {
            allProducts.push(child.val());
        });
        displayProducts(allProducts);
    });
</script>

</body>
</html>
